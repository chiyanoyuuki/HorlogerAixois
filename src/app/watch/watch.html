<div class="page watch" *ngIf="app.data && montreClicked" [class.showContent]="app.showContent">
  <div class="toptitle">
    <p>{{ montreClicked.brand | uppercase }}</p>
    <p>{{ montreClicked.movementType }}</p>
    <p>{{ montreClicked.otherData.reference }}</p>
  </div>
  <div class="topinfos graybloc">
    <div class="left">
      <div class="gallery">
        <button class="gnav prev" *ngIf="images.length > 1" (click)="prevImg()" aria-label="Précédent">‹</button>
        <div class="bigpicture" [class.zoomable]="images.length" (click)="openLightbox()">
          <img
            *ngFor="let image of images; let i = index"
            [src]="imgUrl(image)"
            [class.active]="i === indexImg"
            [alt]="montreClicked.brand + ' ' + montreClicked.model"
          />
          <span class="empty" *ngIf="!images.length">Aucune photo</span>
          <span class="zoom-hint" *ngIf="images.length">⤢</span>
        </div>
        <button class="gnav next" *ngIf="images.length > 1" (click)="nextImg()" aria-label="Suivant">›</button>
      </div>

      <div class="thumbs" *ngIf="images.length > 1">
        <button
          class="thumb"
          *ngFor="let image of images; let i = index"
          [class.active]="i === indexImg"
          (click)="select(i)"
        >
          <img [src]="imgUrl(image)" [alt]="'photo ' + (i + 1)" />
        </button>
      </div>
    </div>
    <div class="right">
      <div *ngFor="let info of getFirstInfos()" class="info">
        <p>{{ info[app.lg] }} :</p>
        <p>{{ montreClicked[info['id']] }}</p>
      </div>
    </div>
  </div>

  <div class="bottominfos">
    <div *ngFor="let info of getBotInfos()" class="info">
      <p>{{ info[app.lg] }}</p>
      <p>{{ montreClicked[info['id']] }}</p>
    </div>
  </div>

  <app-lastarrival [title]="'similar'" [list]="similar" (montreClick)="onMontreClick($event)">
  </app-lastarrival>
</div>

<!-- Lightbox plein écran -->
<div class="lightbox" *ngIf="lightboxOpen" (click)="closeLightbox()">
  <button class="lb-close" (click)="closeLightbox()" aria-label="Fermer">✕</button>
  <button
    class="lb-nav prev"
    *ngIf="images.length > 1"
    (click)="prevImg(); $event.stopPropagation()"
    aria-label="Précédent"
  >
    ‹
  </button>
  <img [src]="imgUrl(images[indexImg])" (click)="$event.stopPropagation()" alt="" />
  <button
    class="lb-nav next"
    *ngIf="images.length > 1"
    (click)="nextImg(); $event.stopPropagation()"
    aria-label="Suivant"
  >
    ›
  </button>
  <div class="lb-count" *ngIf="images.length > 1">{{ indexImg + 1 }} / {{ images.length }}</div>
</div>
