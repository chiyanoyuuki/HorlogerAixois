<div
  *ngIf="app.data && app.montres"
  [class.paysage]="paysage"
  [class.portrait]="!paysage"
  [class.scrolled]="isScrolled"
  [class.mobile]="app.mobile"
>
  <header class="site-header" [class.scrolled]="isScrolled">
    <div class="header-inner">
      <button
        class="burger"
        [class.open]="app.mobilemenuvisible"
        (click)="clickMobileMenu()"
        aria-label="Menu"
      >
        <span></span><span></span><span></span>
      </button>

      <div class="brand clickable2" (click)="clickMenu('home')">
        <img src="logo.png" alt="HorlogerAixois" />
      </div>

      <nav class="nav">
        <a
          *ngFor="let menu of getMenus()"
          class="nav-link"
          [class.active]="app.menuClicked == menu['id']"
          (click)="clickMenu(menu['id'])"
          [innerHTML]="menu[app.lg] | uppercase"
        ></a>
      </nav>

      <div class="actions">
        <button
          class="icon-btn"
          (click)="app.lg == 'fr' ? (app.lg = 'en') : (app.lg = 'fr')"
          [title]="app.lg == 'fr' ? 'English' : 'Français'"
        >
          <img [src]="app.lg + '.png'" alt="" />
        </button>
        <button class="icon-btn" (click)="toggleDarkMode()" title="Thème clair / sombre">
          <img src="moon.png" alt="" />
        </button>
        <button
          class="icon-btn"
          (click)="clickMenu('watches', undefined, true)"
          title="Rechercher une montre"
        >
          <img src="loupe.png" alt="" />
        </button>
      </div>
    </div>
  </header>

  <!-- Menu mobile -->
  <div class="drawer-backdrop" [class.show]="app.mobilemenuvisible" (click)="clickMobileMenu()"></div>
  <aside class="mobile-drawer" [class.open]="app.mobilemenuvisible">
    <a
      *ngFor="let menu of getMenus()"
      class="drawer-link"
      [class.active]="app.menuClicked == menu['id']"
      (click)="clickMenu(menu['id'])"
      [innerHTML]="menu[app.lg] | uppercase"
    ></a>
    <div class="drawer-actions">
      <button (click)="app.lg == 'fr' ? (app.lg = 'en') : (app.lg = 'fr')">
        <img [src]="app.lg + '.png'" alt="" /> {{ app.lg | uppercase }}
      </button>
      <button (click)="toggleDarkMode()"><img src="moon.png" alt="" /> Thème</button>
    </div>
  </aside>

  <router-outlet></router-outlet>

  <div class="footer">
    <div class="mentionsconf">
      <p class="clickable" (click)="clickMenu('legal')">{{ app.data[app.lg].legalmentions }}</p>
    </div>
    <div class="line"></div>
    <p class="rightsreserved">@{{ currentYear }} {{ app.data[app.lg].rightsreserved }}</p>
  </div>

  <!-- Administration -->
  <app-admin-panel></app-admin-panel>
  <button
    class="admin-fab"
    *ngIf="admin.isAdmin && !admin.panelOpen"
    (click)="admin.togglePanel()"
    title="Éditer le site"
  >
    ✎
  </button>
  <div class="admin-toast" *ngIf="admin.message" [class.error]="admin.messageError">
    {{ admin.message }}
  </div>
</div>
